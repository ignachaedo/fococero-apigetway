name: CI/CD Pipeline - api-gateway

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # TODO: Habilitar cuando eslint esté configurado en api-gateway
      # - name: Run Linter
      #   run: npm run lint

      - name: Run Tests with Coverage
        run: npm test -- --coverage
        env:
          NODE_ENV: test
          PORT: 3000
          AUTH_SERVICE_URL: http://localhost:3001
          GEO_SERVICE_URL: http://localhost:3002
          ALERTAS_SERVICE_URL: http://localhost:3003
          REPORTES_SERVICE_URL: http://localhost:3004
          MULTIMEDIA_SERVICE_URL: http://localhost:3005
          EMERGENCIAS_SERVICE_URL: http://localhost:3006
          ANALITICA_SERVICE_URL: http://localhost:3007
          EUREKA_HOST: localhost
          INTERNAL_SECRET_TOKEN: test-token
          CORS_ORIGINS: http://localhost:5173,http://localhost:3000
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID || 'test-project' }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL || 'test@test.com' }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY || 'test-key' }}

      - name: Build Project
        run: npm run build

      # TODO: Uncomment when Docker secrets are configured (DOCKER_USERNAME, DOCKER_PASSWORD)
